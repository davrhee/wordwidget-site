<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wordwidget — Support</title>
<meta name="description" content="wordwidget support and contact. Questions, problems, or word suggestions - send a note.">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;1,400&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F6FA; --ink: #1A1A2E; --muted: #5C5C70;
    --divider: #E0E0EA; --accent: #3B5BDB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Spectral", Georgia, serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 26px clamp(24px, 6vw, 72px) 0;
    font-family: "Archivo", sans-serif;
  }
  .mark { font-size: 15px; font-weight: 600; }
  .mark a { color: inherit; text-decoration: none; }
  main {
    flex: 1;
    max-width: 640px; width: 100%;
    margin: 0 auto;
    padding: clamp(40px, 8vh, 80px) 24px;
  }
  h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 300; letter-spacing: -0.015em; }
  p { margin-top: 20px; font-size: 1.08rem; line-height: 1.65; text-wrap: pretty; }
  main a {
    color: var(--accent); text-decoration: none;
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
  }
  main a:hover { border-bottom-color: var(--accent); }
  footer {
    border-top: 1px solid var(--divider);
    padding: 20px clamp(24px, 6vw, 72px);
    text-align: center;
    font-family: "Archivo", sans-serif;
    font-size: 13.5px; color: var(--muted);
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<header>
  <div class="mark"><a href="/">wordwidget</a></div>
</header>

<main>
  <h1>Support</h1>
  <p>Thanks for using wordwidget. If you have a question, found a problem, or want to suggest a word, send a note and I'll get back to you.</p>
  <p>Email <a href="mailto:dav@wordwidget.net">dav@wordwidget.net</a>.</p>
</main>

<footer><a href="/">← wordwidget</a></footer>
</body>
</html>
